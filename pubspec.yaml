
name: aaribee_camscan_ai

description: AariBee CamScan AI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  flutter_riverpod: ^2.6.1

  # BRANDING
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

  # SCANNER
  google_mlkit_document_scanner: ^0.4.1
  
  # IMAGE PROCESSING
  image: ^4.8.0


  # FILE STORAGE
  path_provider: ^2.1.3
  path: ^1.9.0
  open_filex: ^4.7.0
  # LOCAL DATABASE
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF EXPORT
  pdf: ^3.11.0
  printing: ^5.13.1


  # SHARE FILES
  share_plus: ^10.0.2

  # PERMISSIONS
  permission_handler: ^11.4.0

  # SVG SUPPORT
  flutter_svg: ^2.0.10+1

  # ANIMATIONS
  animate_do: ^3.3.4

  # CONNECTIVITY
  connectivity_plus: ^6.0.5

  # UUID
  uuid: ^4.5.1

  # DATE FORMAT
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # HIVE GENERATOR
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/images/logo.png

  adaptive_icon_background: "#0B1220"

  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  color: "#0B1220"

  image: assets/images/logo.png

  android: true
  ios: true

  android_12:
    image: assets/images/logo.png
    color: "#0B1220"
